# =============================================================================
# ConfigVault - Test Profile Configuration
# =============================================================================
# H2 in-memory database configuration for testing environment.
# Activate with: --spring.profiles.active=test
# =============================================================================

spring:
  # H2 In-Memory DataSource Configuration
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA Configuration - Recreate schema for each test run
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true

  # Execute SQL scripts
  sql:
    init:
      mode: always

  # H2 Console Access
  h2:
    console:
      enabled: true
